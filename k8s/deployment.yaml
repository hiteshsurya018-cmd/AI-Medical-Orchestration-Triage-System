apiVersion: apps/v1
kind: Deployment
metadata:
  name: docq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: docq
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: docq
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: docq:latest
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
          envFrom:
            - secretRef:
                name: docq-secrets
